<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportyBet</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1b12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .frame-wrap {
    width: 100%;
    max-width: 500px;
    height: 90vh;
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    border: 1px solid #1f3d2a;
    position: relative;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .fallback {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #ddd;
    text-align: center;
    padding: 24px;
  }
  .fallback a {
    background: #17a34a;
    color: #fff;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="frame-wrap">
    <iframe src="https://relay.link" title="SportyBet" id="sbFrame"></iframe>
    <div class="fallback" id="fallback">
      <p>SportyBet can't be displayed in an embedded frame.</p>
      </div>
  </div>
</body>
</html>
